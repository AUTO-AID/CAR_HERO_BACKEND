name: Publish Postman collections

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "postman/**"
      - "scripts/postman/**"
      - "package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate collections
        run: npm run postman:validate

      - name: Publish to Postman Workspace
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: |
          if [ -z "$POSTMAN_API_KEY" ] || [ -z "$POSTMAN_WORKSPACE_ID" ]; then
            echo "Postman secrets are missing"
            exit 1
          fi

          node scripts/postman/publish.cjs
