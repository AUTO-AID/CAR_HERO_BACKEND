version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-hero-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/car_hero
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - car-hero-network

  mongo:
    image: mongo:6
    container_name: car-hero-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - car-hero-network

  mongo-express:
    image: mongo-express
    container_name: car-hero-mongo-express
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - car-hero-network

volumes:
  mongo-data:

networks:
  car-hero-network:
    driver: bridge
